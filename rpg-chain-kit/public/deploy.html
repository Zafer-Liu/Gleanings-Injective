<!doctype html><meta charset="utf-8"><title>Deploy RPG Item Contract</title><script src="/vendor/ethers.umd.min.js"></script><body><h1>Deploy RPG Item Contract</h1><label>Collection name <input id="name" value="My RPG Items"></label><label>Symbol <input id="symbol" value="RPGI"></label><button id="deploy">Deploy with MetaMask</button><pre id="status"></pre><script>deploy.onclick=async()=>{try{const artifact=await(await fetch('/artifacts/RpgItem.json')).json(),provider=new ethers.BrowserProvider(ethereum),signer=await provider.getSigner(),factory=new ethers.ContractFactory(artifact.abi,artifact.bytecode,signer),c=await factory.deploy(name.value,symbol.value);status.textContent=`Submitted: ${c.deploymentTransaction().hash}`;await c.waitForDeployment();status.textContent=`Deployed: ${await c.getAddress()}`}catch(x){status.textContent=`Failed: ${x.message}`}}</script></body>
