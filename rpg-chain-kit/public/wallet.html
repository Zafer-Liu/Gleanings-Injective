<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>确认拾遗藏品</title>
  <script src="/vendor/ethers.umd.min.js"></script><script src="/vendor/walletconnect/index.umd.js"></script>
  <style>
    :root{color-scheme:dark;--night:#17110f;--ink:#211a17;--wood:#342922;--wood-hi:#49362d;--line:#745238;--gold:#d4b46a;--paper:#f4ebdd;--mist:#c7cecb;--red:#a83b32}*{box-sizing:border-box}body{min-width:320px;min-height:100vh;margin:0;background:radial-gradient(circle at 80% 0,#49362d 0,transparent 38%),var(--night);color:var(--paper);font:ui-sans-serif,system-ui,"Microsoft YaHei",sans-serif}main{width:min(600px,calc(100% - 32px));margin:clamp(26px,8vh,70px) auto;padding:clamp(22px,4vw,38px);border:1px solid var(--line);background:linear-gradient(145deg,#342922,#211a17 72%);box-shadow:12px 12px 0 #0e0a09}.mark{color:var(--gold);font:600 11px ui-monospace,monospace;letter-spacing:.14em}h1{margin:17px 0 8px;font:500 clamp(27px,6vw,40px) "Noto Serif SC","Songti SC",serif;letter-spacing:.04em}.intro{margin:0;color:var(--mist);font-size:14px;line-height:1.7}.request{margin:26px 0 18px;padding:16px;border-block:1px solid #5a4032;color:var(--mist);font:13px ui-monospace,monospace;line-height:1.8;white-space:pre-wrap}.methods{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.action{min-height:92px;padding:14px;border:1px solid var(--line);background:#211a17;color:var(--paper);font:inherit;text-align:left;cursor:pointer}.action:hover:not(:disabled){border-color:var(--gold);background:var(--wood-hi)}.action:focus-visible{outline:3px solid var(--paper);outline-offset:3px}.action strong{display:block;margin-bottom:5px}.action small{color:var(--mist);line-height:1.45}.action--primary{border-color:#d9a052;background:var(--red)}.action:disabled{cursor:wait;opacity:.6}.status{min-height:50px;margin:22px 0 0;padding-top:14px;border-top:1px solid #5a4032;color:var(--mist);font-size:13px;line-height:1.7}.status--error{color:#f3c0b8}.status--success{color:var(--gold)}code{color:var(--gold);overflow-wrap:anywhere}@media(max-width:500px){main{width:calc(100% - 22px);margin:11px auto;padding:24px 20px;box-shadow:6px 6px 0 #0e0a09}.methods{grid-template-columns:1fr}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}
  </style>
</head>
<body><main>
  <div class="mark">GLEANINGS / INJECTIVE EVM</div><h1>确认你的藏品操作</h1><p class="intro">请在你选择的钱包中确认。交易由你的钱包直接签名，《拾遗》不会接触私钥。</p>
  <div class="request" id="request">正在读取操作…</div>
  <div class="methods"><button class="action action--primary" id="extension" disabled><strong>浏览器钱包确认</strong><small>MetaMask、OKX Wallet 等扩展</small></button><button class="action" id="mobile" disabled><strong>手机扫码确认</strong><small>打开二维码后，在手机钱包内确认</small></button></div>
  <p class="status" id="status" role="status">准备中…</p>
</main>
<script>
  const id=new URLSearchParams(location.search).get('request'),out=document.querySelector('#status'),summary=document.querySelector('#request'),extension=document.querySelector('#extension'),mobile=document.querySelector('#mobile');let request,config;
  const api=async(path,options={})=>{const r=await fetch(path,{headers:{'Content-Type':'application/json'},...options}),d=await r.json();if(!r.ok)throw Error(d.error||'请求失败');return d};
  const status=(message,type='')=>{out.className=`status ${type?`status--${type}`:''}`;out.innerHTML=message};
  const label=()=>request?.action?.kind==='transfer'?'转让':'上链展示';
  const setBusy=(busy)=>{extension.disabled=busy;mobile.disabled=busy};
  const ensureChain=async(provider)=>{const wanted=`0x${Number(config.chain_id).toString(16)}`;try{if((await provider.request({method:'eth_chainId'})).toLowerCase()===wanted)return;await provider.request({method:'wallet_switchEthereumChain',params:[{chainId:wanted}]})}catch(error){if(error?.code!==4902)throw error;await provider.request({method:'wallet_addEthereumChain',params:[{chainId:wanted,chainName:config.chain_name,nativeCurrency:{name:config.native_currency,symbol:config.native_currency,decimals:18},rpcUrls:[config.rpc_url],blockExplorerUrls:config.explorer?[config.explorer]:[]} ]})}};
  const sign=async(provider)=>{try{setBusy(true);status(`正在连接钱包并准备${label()}…`);await ensureChain(provider);const browserProvider=new ethers.BrowserProvider(provider),signer=await browserProvider.getSigner(),from=await signer.getAddress();if(from.toLowerCase()!==request.action.wallet.toLowerCase())throw Error(`请使用尾号 ${request.action.wallet.slice(-4)} 的钱包确认`);const artifact=await api('/artifacts/RpgItem.json'),c=new ethers.Contract(config.contract_address,artifact.abi,signer);let tx;if(request.action.kind==='mint')tx=await c.mintToSelf(request.action.token_uri,request.action.provenance_hash);else tx=await c.safeTransferFrom(from,request.action.to_wallet,BigInt(request.action.token_id));status(`交易已提交：<br><code>${tx.hash}</code><br>正在等待 Injective EVM 确认…`);await tx.wait();await api(`/api/rpg/requests/${id}/complete`,{method:'POST',body:JSON.stringify({tx_hash:tx.hash})});status(`已完成${label()}：<br><code>${tx.hash}</code><br>可以关闭此窗口并返回收藏馆。`,'success')}catch(error){status(`操作未完成：${error.message||String(error)}`,'error');try{await api(`/api/rpg/requests/${id}/fail`,{method:'POST',body:JSON.stringify({error:error.message||String(error)})})}catch{}}finally{setBusy(false)}};
  extension.onclick=async()=>{const providers=window.ethereum?.providers||[window.ethereum];const provider=providers.find(Boolean);if(!provider){status('没有发现浏览器钱包。可改用手机扫码确认。','error');return}await sign(provider)};
  mobile.onclick=async()=>{try{if(!config.walletconnect_project_id)throw Error('此服务尚未配置 WalletConnect Project ID。请让部署者在 Railway Variables 设置 WALLETCONNECT_PROJECT_ID。');const EthereumProvider=globalThis['@walletconnect/ethereum-provider']?.EthereumProvider;if(!EthereumProvider)throw Error('二维码组件加载失败，请刷新页面后重试。');setBusy(true);status('正在打开二维码，请使用手机钱包的 WalletConnect 功能扫码。');const provider=await EthereumProvider.init({projectId:config.walletconnect_project_id,optionalChains:[Number(config.chain_id)||1439],showQrModal:true,rpcMap:{[Number(config.chain_id)||1439]:config.rpc_url},metadata:{name:'拾遗收藏馆',description:'Gleanings Injective collection',url:location.origin,icons:[]}});await provider.connect();await sign(provider)}catch(error){status(`扫码确认失败：${error.message||String(error)}`,'error');setBusy(false)}};
  (async()=>{try{if(!id)throw Error('缺少待确认操作');[request,config]=await Promise.all([api(`/api/rpg/requests/${id}`),api('/api/rpg/config')]);summary.textContent=`操作：${label()}\n钱包：${request.action.wallet}\n网络：${config.chain_name} (${config.chain_id})`;setBusy(false);status('请选择浏览器钱包，或用手机钱包扫码确认。')}catch(error){summary.textContent='无法读取操作';status(error.message||String(error),'error')}})();
</script></body></html>
