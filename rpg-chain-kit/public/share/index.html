<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#241b17">
<title>拾遗 · 藏品分享</title>
<style>
  :root { --ink:#241b17; --wood:#342922; --line:#765035; --paper:#f2e7d7; --straw:#d4b46a; --red:#a83b32; --mist:#c7cecb; }
  * { box-sizing:border-box; } html { overflow-x:hidden; } body { margin:0; min-height:100vh; overflow-x:hidden; color:var(--paper); background:radial-gradient(circle at 80% 0,#4a3529 0,transparent 35rem),var(--ink); font-family:"Noto Serif SC","Source Han Serif SC",serif; }
  main { width:min(100% - 32px,760px); margin:auto; padding:28px 0 52px; } header { display:flex; justify-content:space-between; gap:20px; align-items:start; padding-bottom:22px; border-bottom:1px solid var(--line); }
  .kicker { margin:0 0 8px; color:var(--straw); font:11px "Cascadia Mono",monospace; letter-spacing:.14em; } h1 { margin:0; font-size:clamp(32px,8vw,56px); font-weight:500; letter-spacing:.06em; } h1 span { color:var(--red); }
  .network { margin:5px 0 0; color:var(--mist); font-size:12px; text-align:right; line-height:1.7; }.network strong { color:var(--straw); font-weight:500; }
  .address-form { display:grid; grid-template-columns:1fr auto; gap:8px; margin:24px 0 14px; }.address-form[hidden] { display:none; } input,button { font:inherit; } input { width:100%; min-width:0; overflow:hidden; color:var(--paper); background:#17110f; border:1px solid var(--line); padding:13px; outline:none; text-overflow:ellipsis; } input:focus { border-color:var(--straw); box-shadow:0 0 0 3px #d4b46a33; } button { border:1px solid var(--straw); color:var(--paper); background:#4a3529; padding:10px 14px; cursor:pointer; } button:hover { filter:brightness(1.15); } .primary { background:var(--red); border-color:#d99f53; }
  .hint { min-height:24px; margin:0 0 20px; color:var(--mist); font-size:13px; line-height:1.65; }.hint.error { color:#ffc5b4; }
  .profile { display:flex; align-items:center; justify-content:space-between; gap:16px; min-width:0; padding:18px; background:#30241f; border:1px solid var(--line); } .profile h2 { margin:0 0 4px; font-size:17px; font-weight:500; }.profile code { display:block; max-width:100%; color:var(--straw); font:12px "Cascadia Mono",monospace; overflow-wrap:anywhere; }.actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:end; }.actions button { font-size:12px; }
  .collection { margin-top:22px; } .collection-head { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin:0 0 10px; }.collection-head h2 { margin:0; font-weight:500; font-size:22px; }.collection-head span { color:var(--straw); font:12px "Cascadia Mono",monospace; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }.card { min-width:0; min-height:190px; overflow:hidden; display:flex; flex-direction:column; gap:12px; padding:18px; background:#30241f; border:1px solid #664735; }.seal { display:grid; place-items:center; width:46px; height:46px; color:var(--paper); background:var(--red); border:2px solid var(--straw); border-radius:50%; font-size:20px; }.card-art { position:relative; width:100%; height:170px; min-width:0; flex:0 0 170px; overflow:hidden; background:#17110f; border:1px solid #664735; }.card-art img { position:absolute; inset:16px; display:block; width:calc(100% - 32px); height:calc(100% - 32px); object-fit:contain; image-rendering:pixelated; }.tag { color:var(--straw); font:10px "Cascadia Mono",monospace; letter-spacing:.1em; }.card h3 { margin:0; font-size:19px; font-weight:500; }.card p { flex:1; margin:0; color:var(--mist); font-size:13px; line-height:1.6; }.token { padding-top:10px; border-top:1px solid #664735; color:var(--straw); font:11px "Cascadia Mono",monospace; }.card-actions { display:flex; align-items:stretch; gap:8px; flex-wrap:wrap; }.card-actions button,.card-actions a { display:inline-flex; align-items:center; min-height:39px; border:1px solid var(--straw); padding:9px 12px; color:var(--paper); background:#4a3529; font-size:12px; text-decoration:none; cursor:pointer; }.card-share { color:var(--paper); background:var(--red)!important; border-color:#d99f53!important; }.card-transfer { background:#17110f!important; }.card-dot:hover { filter:brightness(1.15); }.empty { padding:32px 18px; color:var(--mist); text-align:center; background:#30241f; border:1px dashed var(--line); line-height:1.7; }
  .share-sheet { display:none; margin-top:16px; padding:16px; background:#17110f; border:1px solid var(--line); }.share-sheet.visible { display:grid; grid-template-columns:128px 1fr; gap:16px; align-items:center; }.share-sheet img { width:128px; height:128px; background:#fff; }.share-sheet p { margin:0; color:var(--mist); font-size:13px; line-height:1.7; }.share-sheet code { color:var(--straw); overflow-wrap:anywhere; }
  .relay { border-top:1px solid #664735; padding-top:10px; }.relay summary { color:var(--straw); cursor:pointer; font-size:12px; }.relay-list { display:grid; gap:7px; margin:10px 0; }.relay-entry { display:grid; grid-template-columns:auto 1fr; gap:7px; color:var(--mist); font-size:12px; line-height:1.55; }.relay-entry b { color:var(--straw); font-weight:500; }.relay-form { display:grid; grid-template-columns:72px minmax(0,1fr) auto; gap:7px; }.relay-form select { min-height:38px; color:var(--paper); border:1px solid var(--line); background:#17110f; padding:0 6px; }.relay-form input { min-height:38px; padding:8px; font-size:12px; }.relay-form button { min-height:38px; padding:8px 10px; font-size:12px; }.relay-status { min-height:18px; margin:7px 0 0; color:var(--mist); font-size:11px; }.relay-status.error { color:#ffc5b4; }
  .visit-panel { margin-top:28px; padding:18px; border:1px solid var(--line); background:#211916; }.visit-panel[hidden] { display:none; }.visit-head { display:flex; align-items:baseline; justify-content:space-between; gap:12px; border-bottom:1px solid #664735; padding-bottom:12px; }.visit-head h2 { margin:0; font-size:22px; font-weight:500; }.visit-head p { margin:0; color:var(--mist); font-size:12px; }.visit-list { display:grid; gap:8px; margin:14px 0; }.visit-entry { display:grid; grid-template-columns:32px 1fr auto; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid #4b3429; }.visit-entry:last-child { border-bottom:0; }.visit-seal { display:grid; place-items:center; width:30px; height:30px; color:var(--paper); border:1px solid var(--straw); border-radius:50%; font-size:15px; }.visit-entry p { margin:0; color:var(--paper); font-size:13px; line-height:1.55; }.visit-entry time { color:#a99684; font:10px "Cascadia Mono",monospace; }.visit-empty { margin:14px 0; color:var(--mist); font-size:13px; line-height:1.7; }.visit-form { display:grid; grid-template-columns:auto minmax(0,1fr) auto; gap:8px; align-items:center; padding-top:14px; border-top:1px solid #664735; }.visit-form select { min-height:43px; color:var(--paper); border:1px solid var(--line); background:#17110f; padding:0 8px; }.visit-form button { min-height:43px; white-space:nowrap; }.visit-form input { min-height:43px; padding:10px; font-size:13px; }.visit-status { min-height:20px; margin:8px 0 0; color:var(--mist); font-size:12px; }.visit-status.error { color:#ffc5b4; }
  .transfer-modal[hidden] { display:none; }.transfer-modal { position:fixed; inset:0; z-index:10; display:grid; place-items:center; padding:18px; background:#100c0aeF; }.transfer-panel { width:min(100%,520px); padding:24px; border:1px solid var(--straw); background:linear-gradient(145deg,#342922,#211a17 72%); box-shadow:10px 10px 0 #0e0a09; }.transfer-head { display:flex; justify-content:space-between; align-items:start; gap:16px; padding-bottom:14px; border-bottom:1px solid var(--line); }.transfer-head h2 { margin:0; font-size:23px; font-weight:500; }.transfer-head button { padding:7px 10px; }.transfer-copy { color:var(--mist); font-size:13px; line-height:1.7; }.transfer-panel label { display:block; margin-bottom:7px; color:var(--straw); font-size:12px; }.transfer-panel input { margin-bottom:10px; font:12px "Cascadia Mono",monospace; }.transfer-panel .primary { width:100%; min-height:46px; }.transfer-status { min-height:24px; margin:12px 0 0; color:var(--mist); font-size:12px; line-height:1.6; }
  footer { margin-top:28px; color:#a99684; font:12px "Cascadia Mono",monospace; text-align:center; line-height:1.7; } @media(max-width:560px) { main { width:min(100% - 24px,760px); padding:18px 0 36px; } header { display:block; padding-bottom:18px; } h1 { font-size:36px; }.network { text-align:left; margin-top:12px; }.address-form { grid-template-columns:1fr; margin-top:18px; }.address-form input { font-size:12px; }.profile { display:block; padding:14px; }.actions { justify-content:start; margin-top:14px; }.collection { margin-top:26px; }.grid { grid-template-columns:minmax(0,1fr); }.card { padding:14px; }.card-art { height:190px; flex-basis:190px; }.card-art img { inset:14px; width:calc(100% - 28px); height:calc(100% - 28px); }.share-sheet.visible { grid-template-columns:88px minmax(0,1fr); }.share-sheet img { width:88px; height:88px; }.visit-panel { padding:14px; }.visit-form { grid-template-columns:64px minmax(0,1fr); }.visit-form button { grid-column:1 / -1; } }
</style>
<body><main>
  <header><div><p class="kicker">GLEANINGS / COLLECTION SHARE</p><h1>拾遗 <span>· 藏品册</span></h1></div><p class="network"><strong>INJECTIVE EVM TESTNET</strong><br>文化记忆，归属于玩家</p></header>
  <form class="address-form" id="address-form"><input id="wallet" aria-label="钱包地址" placeholder="输入或粘贴 EVM 钱包地址" autocomplete="off"><button class="primary">查看玩家收藏</button></form>
  <p class="hint" id="hint">输入钱包地址，即可读取该地址公开持有的链上藏品。</p>
  <section class="profile" id="profile" hidden><div><h2>玩家收藏</h2><code id="owner"></code></div><div class="actions"><button id="switch-player">切换玩家</button><button id="share">手机分享</button><button id="copy">复制链接</button></div></section>
  <section class="share-sheet" id="share-sheet"><img id="qr" alt="打开此收藏页的二维码"><p>用手机相机扫描二维码，或把下方链接发送给朋友。<br><code id="share-url"></code></p></section>
  <section class="collection" id="collection" hidden><div class="collection-head"><h2 id="collection-title">链上收藏</h2><span id="count"></span></div><div class="grid" id="grid"></div></section>
  <section class="visit-panel" id="visit-panel" hidden aria-labelledby="visit-title"><div class="visit-head"><h2 id="visit-title">来访笺</h2><p>留下你的今日印记</p></div><div class="visit-list" id="visit-list"></div><p class="visit-empty" id="visit-empty" hidden>还没有来访笺。成为第一位留下回响的人。</p><form class="visit-form" id="visit-form"><select id="visit-seal" aria-label="选择印记"><option value="见">见</option><option value="念">念</option><option value="暖">暖</option><option value="藏">藏</option></select><input id="visit-message" aria-label="来访笺内容" minlength="2" maxlength="60" placeholder="留下 2–60 字的回响" required><button class="primary" type="submit">留下印记</button></form><p class="visit-status" id="visit-status" role="status"></p></section>
  <footer>公开读取 · 自主展示 · 不请求私钥</footer>
</main>
<section class="transfer-modal" id="transfer-modal" role="dialog" aria-modal="true" aria-labelledby="transfer-title" hidden>
  <form class="transfer-panel" id="transfer-form">
    <div class="transfer-head"><div><p class="kicker">GLEANINGS / OWNERSHIP</p><h2 id="transfer-title">转赠链上藏品</h2></div><button type="button" id="transfer-close">关闭 ×</button></div>
    <p class="transfer-copy">你正在转移 <strong id="transfer-name"></strong> 的 ERC‑721 所有权。确认后藏品将离开当前钱包，接收方连接自己的钱包即可读取。</p>
    <label for="transfer-wallet">接收方 0x 钱包地址</label>
    <input id="transfer-wallet" placeholder="0x…" autocomplete="off" spellcheck="false" required>
    <button class="primary" id="transfer-submit">前往钱包确认转赠</button>
    <p class="transfer-status" id="transfer-status" role="status">此操作需要当前持有人在钱包中签名。</p>
  </form>
</section>
<script type="module">
  import { collectionType } from './collectible-kind.js';
  const form=document.querySelector('#address-form'), input=document.querySelector('#wallet'), hint=document.querySelector('#hint'), profile=document.querySelector('#profile'), collection=document.querySelector('#collection'), collectionTitle=document.querySelector('#collection-title'), grid=document.querySelector('#grid'), owner=document.querySelector('#owner'), count=document.querySelector('#count'), shareSheet=document.querySelector('#share-sheet'), qr=document.querySelector('#qr'), shareUrl=document.querySelector('#share-url'), transferModal=document.querySelector('#transfer-modal'), transferForm=document.querySelector('#transfer-form'), transferName=document.querySelector('#transfer-name'), transferWallet=document.querySelector('#transfer-wallet'), transferStatus=document.querySelector('#transfer-status'), transferSubmit=document.querySelector('#transfer-submit'),visitPanel=document.querySelector('#visit-panel'),visitList=document.querySelector('#visit-list'),visitEmpty=document.querySelector('#visit-empty'),visitForm=document.querySelector('#visit-form'),visitSeal=document.querySelector('#visit-seal'),visitMessage=document.querySelector('#visit-message'),visitStatus=document.querySelector('#visit-status');
  const pageParams=new URLSearchParams(location.search); let selectedToken=pageParams.get('token')||'';
  let transferToken='',transferItemName='',relaysByToken={};
  const short=(address)=>`${address.slice(0,6)}…${address.slice(-4)}`;
  const escapeHtml=(value)=>String(value).replace(/[&<>'"]/g,(character)=>({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[character]));
    const imageFor=(item)=>item.collectible_id==='item_taipo_note'?'/collection/taipo-note.png':item.collectible_id==='act1-winter-brewing'||item.medal_id==='act1-winter-brewing'?'/collection/winter-brewing.png':item.image||'';
  const safeImage=(value)=>{if(!value)return'';try{const url=new URL(value,location.origin);return ['http:','https:'].includes(url.protocol)?url.href:''}catch{return''}};
  const collectionUrl=(wallet,token='')=>{const url=new URL(location.pathname,location.origin);url.searchParams.set('wallet',wallet);if(token)url.searchParams.set('token',token);return url.toString()};
  const dotUrl=(wallet,token)=>`/dot/?wallet=${encodeURIComponent(wallet)}&token=${encodeURIComponent(token)}`;
  const setHint=(message,error=false)=>{hint.textContent=message;hint.className=`hint${error?' error':''}`};
  const visitorKey=()=>{const key='gleanings.visit-key.v1',stored=localStorage.getItem(key);if(stored)return stored;const value=crypto.randomUUID().replaceAll('-','');localStorage.setItem(key,value);return value};
  const visitTime=(value)=>{const date=new Date(value),diff=Math.max(0,Date.now()-date.getTime());if(diff<60_000)return'刚刚';if(diff<3_600_000)return`${Math.floor(diff/60_000)} 分钟前`;if(diff<86_400_000)return`${Math.floor(diff/3_600_000)} 小时前`;return`${Math.floor(diff/86_400_000)} 天前`};
  const renderVisits=(visits)=>{visitList.innerHTML=visits.map((visit)=>`<article class="visit-entry"><span class="visit-seal" aria-label="${escapeHtml(visit.seal)}印记">${escapeHtml(visit.seal)}</span><p>${escapeHtml(visit.message)}</p><time datetime="${escapeHtml(visit.created_at)}">${visitTime(visit.created_at)}</time></article>`).join('');visitEmpty.hidden=visits.length!==0;};
  async function loadVisits(address){visitPanel.hidden=false;visitList.innerHTML='';visitEmpty.hidden=true;visitStatus.textContent='正在读取来访笺…';visitStatus.className='visit-status';try{const response=await fetch(`/api/rpg/social/visits/${encodeURIComponent(address)}`),data=await response.json();if(!response.ok)throw Error(data.error||'读取来访笺失败');renderVisits(data.visits||[]);visitStatus.textContent=data.persistent?'':'演示模式：部署 Railway Postgres 后，来访笺会长期保存。'}catch(error){visitEmpty.hidden=false;visitEmpty.textContent='暂时无法读取来访笺。';visitStatus.textContent=error.message||'读取失败';visitStatus.className='visit-status error'}}
  async function loadRelays(address){try{const response=await fetch(`/api/rpg/social/relays/${encodeURIComponent(address)}`),data=await response.json();if(!response.ok)throw Error(data.error||'读取故事接力失败');return (data.relays||[]).reduce((grouped,relay)=>{(grouped[String(relay.token_id)]??=[]).push(relay);return grouped},{})}catch{return {}}}
  const relayMarkup=(token)=>{const relays=relaysByToken[String(token)]||[],recent=relays.slice(0,3).map((relay)=>`<div class="relay-entry"><b>${escapeHtml(relay.theme)}</b><span>${escapeHtml(relay.message)}</span></div>`).join('');return `<details class="relay"><summary>接力故事${relays.length?` · ${relays.length} 则`:''}</summary><div class="relay-list">${recent||'<span class="relay-entry">还没有人接力这段故事。</span>'}</div><form class="relay-form" data-relay-token="${escapeHtml(token)}"><select aria-label="故事接力主题"><option>家书</option><option>守艺</option><option>乡愁</option><option>传承</option><option>回响</option></select><input aria-label="故事接力内容" minlength="2" maxlength="36" placeholder="用一句话续写这段记忆" required><button type="submit">接力</button></form><p class="relay-status" role="status"></p></details>`};
  const showShare=(wallet,token=selectedToken)=>{const url=collectionUrl(wallet,token);shareUrl.textContent=url;qr.src=`https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(url)}`;shareSheet.classList.add('visible')};
  async function load(wallet) {
    if(!/^0x[a-fA-F0-9]{40}$/.test(wallet)){setHint('请输入有效的 0x 开头 EVM 钱包地址。',true);return;}
    setHint('正在从 Injective EVM 读取公开藏品…'); profile.hidden=true; collection.hidden=true;
    try {
      const response=await fetch(`/api/rpg/assets/${wallet}`); const assets=await response.json(); if(!response.ok) throw Error(assets.error||'读取失败');
      const address=assets[0]?.owner||wallet, visibleAssets=selectedToken?assets.filter((asset)=>String(asset.token_id)===selectedToken):assets; relaysByToken=await loadRelays(address); input.value=address; owner.textContent=short(address); owner.title=address; profile.hidden=false; collection.hidden=false; collectionTitle.textContent=selectedToken?'分享的藏品':'链上收藏'; count.textContent=selectedToken?(visibleAssets.length?'1 件':'未找到'):`${assets.length} 件`;
      grid.innerHTML=visibleAssets.length?visibleAssets.map((asset)=>{const item=asset.item||{},type=collectionType(item);const image=safeImage(imageFor(item));const name=item.name_zh||item.name||`藏品 #${asset.token_id}`,description=item.description_zh||item.description||'这件藏品记录了一次独一无二的游戏旅程。';const visual=image?`<div class="card-art"><img src="${escapeHtml(image)}" alt="${escapeHtml(name)}"></div>`:`<div class="seal">${type.glyph}</div>`;const itemShareUrl=collectionUrl(address,asset.token_id);return `<article class="card" data-collectible-kind="${escapeHtml(type.kind)}">${visual}<span class="tag">${escapeHtml(type.label)}</span><h3>${escapeHtml(name)}</h3><p>${escapeHtml(description)}</p><div class="token">INJ TESTNET · TOKEN #${escapeHtml(asset.token_id)}</div><div class="card-actions"><a class="card-share" href="${escapeHtml(itemShareUrl)}" aria-label="打开 ${escapeHtml(name)} 的分享展示链接">分享展示链接</a><a class="card-dot" href="${escapeHtml(dotUrl(address,asset.token_id))}">手机投到墨屏</a><button class="card-transfer" data-transfer-token="${escapeHtml(asset.token_id)}" data-transfer-name="${escapeHtml(name)}">转赠所有权</button></div>${relayMarkup(asset.token_id)}</article>`}).join(''):selectedToken?'<div class="empty">这件藏品已不在该钱包中，可能已经转让给其他玩家。</div>':'<div class="empty">这个钱包暂时没有已上链的收藏。<br>回到《拾遗》，在收藏馆选择“上链展示”即可添加。</div>';
      setHint(selectedToken&&visibleAssets.length?`已读取 ${short(address)} 分享的 Token #${selectedToken}。`:`已读取 ${short(address)} 的公开收藏。`); history.replaceState(null,'',collectionUrl(address,selectedToken));void loadVisits(address);
    } catch(error){setHint(error instanceof Error?error.message:'读取收藏失败',true);}
  }
  form.addEventListener('submit',(event)=>{event.preventDefault();selectedToken='';load(input.value.trim())});
  document.querySelector('#copy').addEventListener('click',async()=>{const address=input.value.trim(),url=collectionUrl(address,selectedToken);await navigator.clipboard.writeText(url);setHint(selectedToken?'单件藏品链接已复制，可以发送给朋友。':'收藏链接已复制，可以发送给朋友。');showShare(address,selectedToken)});
  document.querySelector('#switch-player').addEventListener('click',()=>{selectedToken='';form.hidden=false;input.value='';input.focus();setHint('输入另一位玩家的 0x 钱包地址，即可切换查看其公开收藏。')});
  document.querySelector('#share').addEventListener('click',async()=>{const address=input.value.trim(),url=collectionUrl(address,selectedToken);showShare(address,selectedToken);if(navigator.share){try{await navigator.share({title:selectedToken?'拾遗 · 分享的藏品':'拾遗 · 藏品册',text:selectedToken?'看看我在《拾遗》中收藏的这件文化记忆。':'看看我在《拾遗》中收藏的文化记忆。',url})}catch{}}});
  grid.addEventListener('click',(event)=>{const transferButton=event.target.closest('.card-transfer');if(!transferButton)return;transferToken=transferButton.dataset.transferToken||'';transferItemName=transferButton.dataset.transferName||'拾遗藏品';transferName.textContent=`${transferItemName} · Token #${transferToken}`;transferWallet.value='';transferStatus.textContent='此操作需要当前持有人在钱包中签名。';transferModal.hidden=false;transferWallet.focus();});
  grid.addEventListener('submit',async(event)=>{const relayForm=event.target.closest('.relay-form');if(!relayForm)return;event.preventDefault();const token=relayForm.dataset.relayToken||'',theme=relayForm.querySelector('select').value,message=relayForm.querySelector('input').value.trim(),status=relayForm.parentElement.querySelector('.relay-status'),submit=relayForm.querySelector('button');if(message.length<2)return;submit.disabled=true;status.textContent='正在接力…';status.className='relay-status';try{const response=await fetch('/api/rpg/social/relays',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner_wallet:input.value.trim(),token_id:token,visitor_key:visitorKey(),theme,message})}),data=await response.json();if(!response.ok)throw Error(data.error||'故事接力失败');status.textContent=data.persistent?'已接力这段故事。':'已接力（演示模式将在服务重启后清除）。';await load(input.value.trim())}catch(error){status.textContent=error.message||'故事接力失败';status.className='relay-status error'}finally{submit.disabled=false}});
  document.querySelector('#transfer-close').addEventListener('click',()=>{transferModal.hidden=true});
  transferModal.addEventListener('click',(event)=>{if(event.target===transferModal)transferModal.hidden=true});
  transferForm.addEventListener('submit',async(event)=>{event.preventDefault();const from=input.value.trim(),to=transferWallet.value.trim();if(!/^0x[a-fA-F0-9]{40}$/.test(to)){transferStatus.textContent='请输入接收方完整的 0x EVM 钱包地址。';return}if(from.toLowerCase()===to.toLowerCase()){transferStatus.textContent='接收地址不能与当前钱包相同。';return}transferSubmit.disabled=true;transferStatus.textContent='正在验证所有权并创建转赠请求…';try{const response=await fetch('/api/rpg/requests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind:'transfer',wallet:from,token_id:transferToken,to_wallet:to})}),data=await response.json();if(!response.ok||!data.wallet_url)throw Error(data.error||'无法创建转赠请求');transferStatus.textContent=`请在钱包中确认转赠给 ${short(to)}。`;if(matchMedia('(max-width: 560px)').matches)location.href=data.wallet_url;else window.open(data.wallet_url,'gleanings-transfer','width=560,height=680')}catch(error){transferStatus.textContent=error.message||'转赠请求失败'}finally{transferSubmit.disabled=false}});
  visitForm.addEventListener('submit',async(event)=>{event.preventDefault();const ownerWallet=input.value.trim(),message=visitMessage.value.trim();if(!ownerWallet||message.length<2)return;const submit=visitForm.querySelector('button');submit.disabled=true;visitStatus.textContent='正在留下印记…';visitStatus.className='visit-status';try{const response=await fetch('/api/rpg/social/visits',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner_wallet:ownerWallet,visitor_key:visitorKey(),seal:visitSeal.value,message})}),data=await response.json();if(!response.ok)throw Error(data.error||'保存来访笺失败');visitMessage.value='';visitStatus.textContent=data.persistent?'已留下今日印记。':'已留下今日印记（演示模式将在服务重启后清除）。';await loadVisits(ownerWallet)}catch(error){visitStatus.textContent=error.message||'保存失败';visitStatus.className='visit-status error'}finally{submit.disabled=false}});
  const initial=pageParams.get('wallet'); if(initial){form.hidden=true;input.value=initial;load(initial)};
</script></body></html>
