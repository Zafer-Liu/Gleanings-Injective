<!doctype html><meta charset="utf-8"><title>Sign RPG Item Transaction</title><script src="/vendor/ethers.umd.min.js"></script><body><main><h1>RPG Item Signature</h1><pre id="status">Loading request…</pre><button id="sign" disabled>Sign in MetaMask</button></main><script>
const id=new URLSearchParams(location.search).get('request'),out=document.querySelector('#status'),btn=document.querySelector('#sign');let request;const api=async(path,options={})=>{const r=await fetch(path,{headers:{'Content-Type':'application/json'},...options}),d=await r.json();if(!r.ok)throw Error(d.error||'Request failed');return d};
(async()=>{try{request=await api(`/api/rpg/requests/${id}`);out.textContent=`Action: ${request.action.kind}\nWallet: ${request.action.wallet}`;btn.disabled=false}catch(x){out.textContent=x.message}})();
btn.onclick=async()=>{try{btn.disabled=true;if(!window.ethereum)throw Error('MetaMask is required');const provider=new ethers.BrowserProvider(ethereum),signer=await provider.getSigner(),from=await signer.getAddress();if(from.toLowerCase()!==request.action.wallet.toLowerCase())throw Error('Switch MetaMask to the requested wallet');const cfg=await api('/api/rpg/config'),artifact=await api('/artifacts/RpgItem.json'),c=new ethers.Contract(cfg.contract_address,artifact.abi,signer);let tx;if(request.action.kind==='mint')tx=await c.mintToSelf(request.action.token_uri,request.action.provenance_hash);else tx=await c.safeTransferFrom(from,request.action.to_wallet,BigInt(request.action.token_id));out.textContent=`Submitted: ${tx.hash}\nWaiting for confirmation…`;await tx.wait();await api(`/api/rpg/requests/${id}/complete`,{method:'POST',body:JSON.stringify({tx_hash:tx.hash})});out.textContent=`Confirmed: ${tx.hash}`}catch(x){out.textContent=`Failed: ${x.message}`;btn.disabled=false;try{await api(`/api/rpg/requests/${id}/fail`,{method:'POST',body:JSON.stringify({error:x.message})})}catch{}}};
</script></body>
